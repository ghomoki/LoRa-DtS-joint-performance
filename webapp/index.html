<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LoRa Direct-to-Satellite PDR model</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@stlite/browser@1.8.1/build/stlite.css"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      import { mount } from "https://cdn.jsdelivr.net/npm/@stlite/browser@1.8.1/build/stlite.js";

      mount(
        {
          requirements: ["scipy"],
          entrypoint: "streamlit_app.py",
          files: {
            "streamlit_app.py": { url: "./streamlit_app.py" },
            "lora_dts/__init__.py": { url: "./lora_dts/__init__.py" },
            "lora_dts/conversions.py": { url: "./lora_dts/conversions.py" },
            "lora_dts/lora_toa.py": { url: "./lora_dts/lora_toa.py" },
            "lora_dts/pass_duration.py": { url: "./lora_dts/pass_duration.py" },
            "lora_dts/rician_k.py": { url: "./lora_dts/rician_k.py" },
            "lora_dts/link_success_prob.py": { url: "./lora_dts/link_success_prob.py" },
            "lora_dts/packet_delivery_ratio.py": { url: "./lora_dts/packet_delivery_ratio.py" },
          },
          streamlitConfig: {
            "client.toolbarMode": "viewer",
          },
        },
        document.getElementById("root"),
      );
    </script>
  </body>
</html>
